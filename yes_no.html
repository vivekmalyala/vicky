<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message from Your Loved One ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fff1f2;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        .bounce-in { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) both; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }

        #hearts-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000; /* Foreground */
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            animation: floatUp 4s linear forwards;
            z-index: 1001;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .bear-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            height: 140px;
            transition: all 0.5s ease;
        }

        .bubu, .dudu { font-size: 5.5rem; transition: all 1s ease-in-out; }
        .hugging .bubu { transform: translateX(35px); }
        .hugging .dudu { transform: translateX(-35px); }

        .evading {
            position: fixed !important;
            z-index: 100;
            transition: all 0.1s ease-out;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: #fff1f2;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative p-4 select-none">

    <div id="hearts-container"></div>

    <!-- Start Overlay for Music Activation -->
    <div id="start-overlay">
        <div class="text-7xl mb-6">💌</div>
        <h1 class="text-2xl font-black text-rose-500 mb-8 px-6">Message from your Loved One</h1>
        <button onclick="startApp()" class="px-12 py-4 bg-rose-500 text-white font-black rounded-full shadow-xl animate-bounce text-xl">
            OPEN
        </button>
    </div>

    <!-- Main Card -->
    <div id="main-card" class="bg-white rounded-[2.5rem] shadow-2xl p-8 max-w-sm w-full text-center border-4 border-rose-200 relative z-10 bounce-in">
        
        <div id="graphic-container" class="mb-6 flex justify-center h-32 items-center">
            <div id="bear-wrap" class="bear-box">
                <div class="bubu">🐼</div>
                <div class="dudu">🐻</div>
            </div>
        </div>

        <h1 id="question-text" class="text-3xl font-black text-rose-500 mb-10 leading-tight">
            Do you always say "No" to Vicky?
        </h1>

        <div id="buttons-container" class="flex flex-col gap-4 relative min-h-[180px] justify-center">
            <button id="yes-btn" class="px-6 py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-full shadow-lg transition-all text-lg z-20">
                Yes (Always)
            </button>
            <button id="no-btn" class="px-6 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-full shadow-sm text-lg z-50 transition-all">
                No (Always accepts everything)
            </button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7314777d94.mp3" type="audio/mpeg">
    </audio>
    <audio id="success-music">
        <source src="https://www.myinstants.com/media/sounds/baby-baby-baby-oh.mp3" type="audio/mpeg">
    </audio>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const questionText = document.getElementById('question-text');
        const bearWrap = document.getElementById('bear-wrap');
        const bgMusic = document.getElementById('bg-music');
        const successMusic = document.getElementById('success-music');
        const mainCard = document.getElementById('main-card');

        let stage = 0; // 0: First question, 1: Main "Like" question
        let noCount = 0;
        let evasionCount = 0;

        const noMessages = [
            "Are you sure? 🥺", "Think again! 🧐", "Pleeaaase? 😭", 
            "Don't be mean! 💔", "Vicky is sad now 🥀", "Still \"No\"? 😤",
            "I'm gonna cry... 🌧️", "Last chance!", "Final \"No\" (Catch me!) 🏃‍♂️"
        ];

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            bgMusic.volume = 0.3;
            bgMusic.play().catch(() => {});
        }

        function triggerVibrate() {
            mainCard.classList.add('shake');
            setTimeout(() => mainCard.classList.remove('shake'), 400);
            if ("vibrate" in navigator) navigator.vibrate(200);
        }

        // Logic for Question 1
        yesBtn.onclick = () => {
            if (stage === 0) {
                // Clicking Yes (Always) -> Switch to "Do you like Vicky?"
                switchToMainQuestion();
            } else {
                handleFinalYes();
            }
        };

        noBtn.onclick = () => {
            if (stage === 0) {
                // Clicking No (Always accepts) -> Switch to "So you don't like Vicky?"
                questionText.innerText = "So you don't like Vicky? 🤨";
                yesBtn.innerText = "No, I like him!";
                noBtn.innerText = "Yes, I don't";
                stage = 1;
                yesBtn.onclick = handleFinalYes;
                noBtn.onclick = handleFinalYes;
            } else {
                handleNoSequence();
            }
        };

        function switchToMainQuestion() {
            stage = 1;
            questionText.innerText = "Do you like Vicky? ❤️";
            yesBtn.innerText = "Yes";
            noBtn.innerText = "\"No\"";
            
            // Re-style buttons for the main question
            yesBtn.className = "px-10 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-full shadow-lg transition-all text-xl z-20";
            noBtn.className = "px-10 py-4 bg-gray-200 text-gray-500 font-bold rounded-full shadow-sm text-lg z-50 transition-all";
            
            yesBtn.onclick = handleFinalYes;
            noBtn.onclick = handleNoSequence;
        }

        function handleNoSequence() {
            triggerVibrate();
            if (noCount < noMessages.length - 1) {
                noBtn.innerText = noMessages[noCount];
                const scale = 1 + (noCount * 0.12);
                yesBtn.style.transform = `scale(${scale})`;
                noCount++;
            } else {
                startEvasion();
            }
        }

        function startEvasion() {
            noBtn.classList.add('evading');
            noBtn.onmouseover = doEvade;
            noBtn.ontouchstart = (e) => { e.preventDefault(); doEvade(); };
        }

        function doEvade() {
            if (evasionCount < 10) {
                const x = Math.random() * (window.innerWidth - 140) + 70;
                const y = Math.random() * (window.innerHeight - 100) + 50;
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';
                evasionCount++;
            } else {
                noBtn.classList.remove('evading');
                noBtn.style.position = 'static';
                noBtn.innerText = "Yes (Okay Fine!)";
                noBtn.className = yesBtn.className;
                noBtn.onclick = handleFinalYes; // Fixed: Works like Yes
            }
        }

        function handleFinalYes() {
            bgMusic.pause();
            successMusic.play();
            
            document.getElementById('buttons-container').innerHTML = "";
            questionText.innerHTML = "I knew it! ❤️<br><span class='text-lg font-bold text-rose-400'>You made me the happiest!</span>";
            
            bearWrap.classList.add('hugging');
            
            // Foreground explosion
            for (let i = 0; i < 70; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = ['❤️', '💖', '💕', '🥰', '✨'][Math.floor(Math.random() * 5)];
            h.style.left = Math.random() * 90 + 'vw';
            h.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.getElementById('hearts-container').appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
